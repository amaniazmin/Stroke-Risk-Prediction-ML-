name: Python Application CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Upgrade Pip
      run: python -m pip install --upgrade pip

    - name: Install Framework Core Dependencies
      run: pip install fastapi uvicorn pydantic httpx pytest

    - name: Install Data Science Dependencies
      run: pip install scikit-learn pandas numpy

    - name: Run Test Suite via Pytest
      run: python -m pytest